name: Daily AI article

on:
  schedule:
    # 8am in America/Los_Angeles is 15:00 UTC during daylight saving time.
    - cron: "0 15 * * *"
    # 8am in America/Los_Angeles is 16:00 UTC during standard time.
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Generate even if the local-time/date guard would skip"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: daily-ai-article
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ARTICLE_TIMEZONE: America/Los_Angeles
      FORCE_DAILY_ARTICLE: ${{ github.event_name == 'workflow_dispatch' && inputs.force == true && '1' || '0' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate article
        run: npm run generate:daily-article

      - name: Check for article changes
        id: changes
        run: |
          if git diff --quiet -- content/posts; then
            echo "No article changes to publish."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          npm run lint
          npm run build

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts/en content/posts/fr
          git commit -m "Publish daily AI article"
          git push
